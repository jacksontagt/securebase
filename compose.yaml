services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: securebase
      POSTGRES_PASSWORD: securebase
      POSTGRES_DB: securebase
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  garage:
    image: dxflrs/garage:v1.0.1
    ports:
      - "3900:3900"  # s3 api
      - "3903:3903"  # admin api
    volumes:
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
      - ./garage.toml:/etc/garage.toml:ro

volumes:
  postgres-data:
  garage-data:
  garage-meta:
